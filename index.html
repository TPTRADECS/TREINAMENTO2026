<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TotalPass Trade - Treinamento Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --verde: #26d07c; --roxo: #440099; --azul: #007bff; --rosa: #d62598; --preto: #000000; --cinza: #111111; }
        * { box-sizing: border-box; }
        
        body { 
            background: var(--preto); color: white; font-family: 'Montserrat', sans-serif; 
            margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; 
        }

        /* HEADER COM POSICIONAMENTO AJUSTADO */
        header { 
            width: 100%; background: #0a0a0a; border-bottom: 1px solid #222; 
            padding: 15px 30px; display: flex; align-items: center; justify-content: space-between;
            flex-shrink: 0; z-index: 1000;
        }

        /* Logo à Esquerda acima do menu */
        .header-logo { height: 55px; width: auto; filter: none; }

        /* Slogan Centralizado */
        .header-slogan { 
            font-family: 'Poppins', sans-serif; color: white; font-size: 18px; 
            font-weight: 400; flex-grow: 1; text-align: center; margin-right: 55px; /* Compensa o logo para centralizar */
        }

        .wrapper { display: flex; flex-direction: row; flex-grow: 1; height: calc(100vh - 86px); overflow: hidden; }
        
        aside { 
            width: 220px; background: #0a0a0a; border-right: 1px solid #222; 
            padding: 20px; display: flex; flex-direction: column; gap: 10px; 
            flex-shrink: 0; overflow-y: auto; z-index: 999; 
        }

        .nav-btn { 
            background: var(--verde); color: black; border: none; padding: 14px; 
            border-radius: 8px; font-weight: 900; cursor: pointer; text-align: left; 
            text-transform: uppercase; font-size: 10px; transition: 0.3s; white-space: nowrap;
        }
        .nav-btn.active { outline: 2px solid white; box-shadow: 0 0 10px var(--verde); }

        main { flex-grow: 1; padding: 40px; overflow-y: auto; background: radial-gradient(circle at top right, #1a0033 0%, #000 80%); -webkit-overflow-scrolling: touch; }
        .aba-conteudo { display: none; width: 100%; max-width: 900px; margin: 0 auto; padding-bottom: 80px; } 
        .aba-conteudo.ativa { display: block; animation: fadeIn 0.3s ease; }
        
        h1 { font-size: 32px; font-weight: 900; margin-bottom: 20px; line-height: 1.2; color: white; }
        p { font-size: 16px; color: #ccc; line-height: 1.6; margin-bottom: 15px; }

        .box-detalhes { background: var(--cinza); padding: 30px; border-radius: 15px; border: 1px solid #222; margin-top: 20px; height: auto; min-height: 200px; display: block;}
        .pilar-container { display: flex; flex-wrap: wrap; gap: 10px; margin: 20px 0; }
        .btn-pilar, .btn-app { flex: 1; min-width: 130px; padding: 15px; border: 1px solid #333; background: #0a0a0a; color: #888; font-weight: 900; cursor: pointer; border-radius: 10px; text-transform: uppercase; font-size: 10px; }
        
        .btn-pilar.active-fisico, .btn-verde.active { border-color: var(--verde); color: var(--verde); background: rgba(38, 208, 124, 0.1); }
        .btn-pilar.active-roxo, .btn-roxo.active { border-color: var(--roxo); color: #9d4edd; background: rgba(68, 0, 153, 0.1); } 
        .btn-pilar.active-nutri, .btn-rosa.active { border-color: var(--rosa); color: var(--rosa); background: rgba(214, 37, 152, 0.1); }
        
        .badge { padding: 6px 12px; border-radius: 20px; font-size: 10px; font-weight: 900; margin-right: 5px; margin-bottom: 8px; display: inline-block; border: 1px solid rgba(255,255,255,0.1); }
        .check-item { display: flex; gap: 10px; margin-top: 15px; align-items: flex-start; width: 100%; }
        .check-item b { color: var(--verde); font-size: 18px; flex-shrink: 0; }
        .check-item p { margin: 0; font-size: 14px; color: #eee; line-height: 1.5; }
        
        .video-container { width: 100%; border-radius: 15px; overflow: hidden; border: 1px solid #333; aspect-ratio: 16/9; background: #000; margin-top: 15px; }
        .aviso-rosa { margin-top: 25px; padding: 18px; border: 2px dashed var(--rosa); border-radius: 12px; background: rgba(214, 37, 152, 0.05); color: #fff; font-size: 13px; line-height: 1.5; }

        /* RESPONSIVIDADE MOBILE */
        @media (max-width: 768px) {
            header { flex-direction: column; padding: 10px; text-align: center; }
            .header-logo { height: 40px; margin-bottom: 10px; }
            .header-slogan { margin-right: 0; font-size: 14px; }
            .wrapper { flex-direction: column; height: calc(100vh - 100px); }
            aside { width: 100%; height: auto; border-right: none; border-bottom: 1px solid #222; padding: 10px; flex-direction: row; gap: 6px; overflow-x: auto; position: sticky; top: 0; z-index: 1001; }
            .nav-btn { font-size: 8px; padding: 10px; }
            main { padding: 25px 15px; }
            h1 { font-size: 24px; }
            .btn-pilar, .btn-app { min-width: 100%; font-size: 9px; }
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <header>
        <img src="logo.png" alt="TOTALPASS" class="header-logo">
        <div class="header-slogan">Fazer TotalPass, faz total sentido</div>
    </header>

    <div class="wrapper">
        <aside id="menu-lateral">
            <button class="nav-btn active" onclick="mudar('home', this)">Home</button>
            <button class="nav-btn" onclick="mudar('pila', this)">Pilares</button>
            <button class="nav-btn" onclick="mudar('apps', this)">Apps</button>
            <button class="nav-btn" onclick="mudar('acad', this)">Academias</button>
            <button class="nav-btn" onclick="mudar('diff', this)">Diferenciais</button>
            <button class="nav-btn" onclick="mudar('plan', this)">Planos</button>
            <button class="nav-btn" style="background: var(--rosa); color: white;" onclick="mudar('validacao', this)">Validação</button>
        </aside>

        <main id="conteudo-principal">
            <div id="home" class="aba-conteudo ativa">
                <h1>TREINAMENTO <span style="color: var(--verde);">TRADE 2026</span></h1>
                <div class="video-container"><iframe src="https://drive.google.com/file/d/1onONCtye0LpTh47WGMsTif3_6hiHp8LO/preview" width="100%" height="100%" allowfullscreen style="border:none;"></iframe></div>
            </div>

            <div id="pila" class="aba-conteudo">
                <h1>NOSSOS <span style="color: var(--rosa);">PILARES</span></h1>
                <div class="pilar-container">
                    <button class="btn-pilar" onclick="mudarPilar('fisico', this)">TOTAL FIT</button>
                    <button class="btn-pilar" onclick="mudarPilar('mental', this)">TOTAL MIND</button>
                    <button class="btn-pilar" onclick="mudarPilar('nutri', this)">TOTAL NUTRI</button>
                </div>
                <div id="pilar-desc" class="box-detalhes">Selecione um pilar acima.</div>
            </div>

            <div id="apps" class="aba-conteudo">
                <h1>NOSSOS <span style="color: var(--verde);">APPS</span></h1>
                <div class="pilar-container">
                    <button class="btn-app btn-verde" onclick="mudarInfoApp('queima', this)">Queima Diária</button>
                    <button class="btn-app btn-verde" onclick="mudarInfoApp('totalplay', this)">Total Play</button>
                    <button class="btn-app btn-verde" onclick="mudarInfoApp('coach', this)">Smart Fit Coach</button>
                    <button class="btn-app btn-roxo" onclick="mudarInfoApp('conexa', this)">Conexa</button> 
                    <button class="btn-app btn-roxo" onclick="mudarInfoApp('positiv', this)">Positiv App</button>
                    <button class="btn-app btn-roxo" onclick="mudarInfoApp('starbem', this)">Starbem</button>
                    <button class="btn-app btn-roxo" onclick="mudarInfoApp('zen', this)">Zen App</button>
                    <button class="btn-app btn-rosa" onclick="mudarInfoApp('nutri', this)">Nutri+</button>
                </div>
                <div id="app-desc" class="box-detalhes">Selecione um App.</div>
            </div>

            <div id="acad" class="aba-conteudo">
                <h1>NOSSA REDE DE <span style="color: var(--verde);">ACADEMIAS</span></h1>
                <div class="pilar-container">
                    <button class="btn-pilar" onclick="mudarRede('logos', this)">Principais Redes</button>
                    <button class="btn-pilar" onclick="mudarRede('modalidades', this)">Modalidades</button>
                </div>
                <div id="rede-desc" class="box-detalhes">Selecione uma opção acima.</div>
            </div>

            <div id="diff" class="aba-conteudo">
                <h1>+ <span style="color: var(--rosa);">DIFERENCIAIS</span></h1>
                <div class="pilar-container">
                    <button class="btn-pilar" onclick="mudarDiff('dep', this)">Dependente</button>
                    <button class="btn-pilar" onclick="mudarDiff('vin', this)">Troca de Vínculo</button>
                    <button class="btn-pilar" onclick="mudarDiff('chk', this)">Check-in</button>
                    <button class="btn-pilar" onclick="mudarDiff('onde', this)">Escolha Onde Treinar</button>
                </div>
                <div id="diff-desc" class="box-detalhes">Selecione uma opção acima.</div>
            </div>

            <div id="plan" class="aba-conteudo">
                <h1>PLANOS E <span style="color: var(--rosa);">PAGAMENTO</span></h1>
                <div class="video-container"><iframe src="https://drive.google.com/file/d/1jhnZ_2zSwokAV6jp0pVDWWmhWIwe2QaN/preview" width="100%" height="100%" allowfullscreen style="border:none;"></iframe></div>
            </div>

            <div id="validacao" class="aba-conteudo">
                <h1>VALIDAÇÃO</h1>
                <div style="width: 100%; height: 600px; background: white; border-radius: 12px; overflow: hidden; border: 2px solid var(--verde);"><iframe src="https://docs.google.com/forms/d/e/1FAIpQLSd9LBrv2KtqfIbv5Xi9nwYLh2MHBBbKzvk8He1fGMe3KORErw/viewform?embedded=true" width="100%" height="100%" frameborder="0"></iframe></div>
            </div>
        </main>
    </div>

    <script>
        function mudar(idDestino, btn) {
            document.querySelectorAll('.aba-conteudo').forEach(a => a.style.display = 'none');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(idDestino).style.display = 'block';
            btn.classList.add('active');
            document.getElementById('conteudo-principal').scrollTop = 0;
            if (window.innerWidth <= 768) {
                const menu = document.getElementById('menu-lateral');
                menu.scrollLeft = btn.offsetLeft - (window.innerWidth / 2) + (btn.offsetWidth / 2);
            }
        }

        // Funções de Pillar, App, Rede e Diff mantidas conforme versões aprovadas...
        function mudarPilar(tipo, btn) {
            const display = document.getElementById('pilar-desc');
            document.querySelectorAll('#pila .btn-pilar').forEach(b => b.classList.remove('active-fisico','active-roxo','active-nutri'));
            if(tipo === 'fisico') {
                display.innerHTML = `<h3 style="color:var(--verde); margin-top:0;">TOTAL FIT</h3><p style="font-size:14px;">Cuidando totalmente da sua saúde física.</p><div class="check-item"><b>•</b> <p>MAIS DE 33 MIL academias e estúdios</p></div><div class="check-item"><b>•</b> <p>MAIS DE 250 modalidades</p></div><div class="check-item"><b>•</b> <p>MAIS DE 4 MIL treinos on-line</p></div><div style="margin-top:20px"><span class="badge" style="background:var(--verde); color:black">Queima Diária</span><span class="badge" style="background:var(--verde); color:black">Total Play</span><span class="badge" style="background:var(--verde); color:black">Smart Fit Coach</span></div>`;
                btn.classList.add('active-fisico');
            } else if(tipo === 'mental') {
                display.innerHTML = `<h3 style="color:var(--roxo); filter:brightness(1.5); margin-top:0;">TOTAL MIND</h3><p style="font-size:14px;">Para cuidar totalmente da saúde mental!</p><div class="check-item"><b>•</b> <p>MILHARES de psicólogos</p></div><div class="check-item"><b>•</b> <p>MAIS DE 400 áudios de meditação</p></div><div class="check-item"><b>•</b> <p>27 MIL JORNADAS de autocuidado</p></div><div style="margin-top:20px"><span class="badge" style="background:var(--roxo); color:white">Conexa</span><span class="badge" style="background:var(--roxo); color:white">Positiv App</span><span class="badge" style="background:var(--roxo); color:white">Starbem</span><span class="badge" style="background:var(--roxo); color:white">Zen App</span></div>`;
                btn.classList.add('active-roxo');
            } else {
                display.innerHTML = `<h3 style="color:var(--rosa); margin-top:0;">TOTAL NUTRI</h3><p style="font-size:14px;">Uma nutrição equilibrada!</p><div class="check-item"><b>•</b> <p>PLANO ALIMENTAR personalizado</p></div><div class="check-item"><b>•</b> <p>MAIS DE 60 vídeos de receitas</p></div><div class="check-item"><b>•</b> <p>MAIS DE 400 artigos de receitas</p></div><div style="margin-top:20px"><span class="badge" style="background:var(--rosa); color:white">Nutri+</span><span class="badge" style="background:var(--rosa); color:white">Conteúdos Nutricionais</span></div>`;
                btn.classList.add('active-nutri');
            }
        }

        function mudarInfoApp(app, btn) {
            const display = document.getElementById('app-desc');
            document.querySelectorAll('.btn-app').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const infos = {
                'queima': ['QUEIMA DIÁRIA', 'A maior plataforma de treinos online da América Latina.', 'var(--verde)'],
                'totalplay': ['TOTAL PLAY', 'Treinos exclusivos gravados pelos melhores professores da rede Smart Fit.', 'var(--verde)'],
                'coach': ['SMART FIT COACH', 'Consultoria online com nutricionistas e treinos personalizados.', 'var(--verde)'],
                'conexa': ['CONEXA', 'Telemedicina focada em saúde mental com milhares de psicólogos.', 'var(--roxo)'],
                'positiv': ['POSITIV APP', 'App focado em meditação guiada e autoconhecimento.', 'var(--roxo)'],
                'starbem': ['STARBEM', 'Jornadas de autocuidado e psicólogos online.', 'var(--roxo)'],
                'zen': ['ZEN APP', 'Conteúdos para melhorar o sono e meditações.', 'var(--roxo)'],
                'nutri': ['NUTRI+', 'Acompanhamento nutricional completo com plano alimentar.', 'var(--rosa)']
            };
            display.innerHTML = `<h3 style="color:${infos[app][2]}; margin-top:0;">${infos[app][0]}</h3><p style="color:#eee; line-height:1.6; font-size:14px;">${infos[app][1]}</p>`;
        }

        function mudarRede(tipo, btn) {
            const display = document.getElementById('rede-desc');
            document.querySelectorAll('#acad .btn-pilar').forEach(b => b.classList.remove('active-fisico'));
            btn.classList.add('active-fisico');
            if(tipo === 'logos') {
                display.innerHTML = `<h3 style="color:var(--verde); margin-top:0;">PRINCIPAIS REDES</h3><div style="margin-bottom:20px;"><p style="color:var(--verde); font-weight:900; font-size:12px; margin-bottom:5px; text-transform:uppercase;">Redes Exclusivas:</p><p style="font-size:14px; color:#eee; line-height:1.6;">Smart Fit, Bio Ritmo, Velocity, Race Bootcamp, Vidya, Tonus Gym, Jab House, Kore e One Pilates.</p></div><div><p style="color:var(--verde); font-weight:900; font-size:12px; margin-bottom:5px; text-transform:uppercase;">Redes Parceiras:</p><p style="font-size:14px; color:#eee; line-height:1.6;">Academia Gaviões, SkyFit, RedFit, CrossLife, Buddha Spa, TargetFit, entre outras mais de 33 mil opções.</p></div>`;
            } else {
                display.innerHTML = `<h3 style="color:var(--verde); margin-top:0;">MODALIDADES</h3><p style="font-size:14px; color:#eee; line-height:1.6;">Musculação, Natação, Yoga, Pilates, Beach Tennis, Crossfit e mais de 250 opções.</p>`;
            }
        }

        function mudarDiff(tipo, btn) {
            const display = document.getElementById('diff-desc');
            document.querySelectorAll('#diff .btn-pilar').forEach(b => b.classList.remove('active-fisico'));
            btn.classList.add('active-fisico');
            const aviso = `<div class="aviso-rosa"><b>IMPORTANTE:</b> Para usuários que ainda possuem plano ativo e/ou elegível, é necessário pedir desligamento na empresa antiga ou inativar o plano para que o processo funcione.</div>`;
            if(tipo === 'dep') {
                display.innerHTML = `<h3 style="color:var(--rosa); margin-top:0;">DEPENDENTE</h3><div class="check-item"><b>•</b> <p>No app da TotalPass, clique em "Minha conta";</p></div><div class="check-item"><b>•</b> <p>Vá em "Meus dependentes" e, na sequência, em "Convidar dependentes";</p></div><div class="check-item"><b>•</b> <p>Faça um pré-cadastro inserindo CPF e e-mail do dependente;</p></div><div class="check-item"><b>•</b> <p>Feito isso, compartilhe o convite automático para a pessoa finalizar o cadastro no app.</p></div>`;
            } else if(tipo === 'vin') {
                display.innerHTML = `<h3 style="color:var(--rosa); margin-top:0;">TROCA DE VÍNCULO</h3><p style="font-size:14px; color:#ccc;">Se você deseja transferir seu vínculo para uma nova empresa parceira, siga o passo a passo no app:</p><div class="check-item"><b>•</b> <p>Acesse o app TotalPass, na tela inicial aparecerá a mensagem: “necessário vincular sua conta”;</p></div><div class="check-item"><b>•</b> <p>Clique em “atualizar vínculo da conta”;</p></div><div class="check-item"><b>•</b> <p>Preencha os dados solicitados;</p></div>${aviso}`;
            } else if(tipo === 'chk') {
                display.innerHTML = `<h3 style="color:var(--rosa); margin-top:0;">HISTÓRICO DE CHECK-IN</h3><p style="font-size:14px; color:#eee;">Monitorar o desempenho, ajustar os hábitos e manter o foco no treino ficou ainda mais simples com o histórico de check-ins.</p>`;
            } else if(tipo === 'onde') {
                display.innerHTML = `<h3 style="color:var(--rosa); margin-top:0;">ESCOLHA ONDE TREINAR!</h3><p style="font-size:14px; color:#eee;">Busque e acesse as academias disponíveis no seu plano através do nosso aplicativo. Check-in disponível também via <b>Apple Watch</b>!</p>`;
            }
        }
    </script>
</body>
</html>
